<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トルク関係</title>
  <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>

<header>
  <img src="../../../images/001.gif" class="header-logo">
  <h1>換 算 ア プ リ</h1>
</header>

<h2>トルク換算</h2>

<div class="input-group">
    <input
        type="number"
        id="torqueInput"
        placeholder="トルク値">
    
    <select id="torqueUnit">
        <option value="Nm">N・m</option>
        <option value="kgfcm">kgf・cm</option>
        <option value="kgfm">kgf・m</option>
    </select>
</div>

<button onclick="convertTorque()">
換算
</button>

<div id="torqueConvertResult"></div>

<br>
<hr>

<h2>標準締付トルク表示</h2>

<div class="input-group">
    <select id="boltSize">
        <option value="M3">M3 (5.5mm)</option>
        <option value="M4">M4 (7mm)</option>
        <option value="M5">M5 (8mm)</option>
        <option value="M6">M6 (10mm)</option>
        <option value="M7">M7 (11mm)</option>
        <option value="M8">M8 (13mm)</option>
        <option value="M10">M10 (17mm)</option>
        <option value="M12">M12 (19mm)</option>
        <option value="M14">M14 (22mm)</option>
        <option value="M16">M16 (24mm)</option>
        <option value="M18">M18 (28mm)</option>
        <option value="M20">M20 (30mm)</option>
        <option value="M22">M22 (32mm)</option>
        <option value="M24">M24 (36mm)</option>
    </select>
</div>

<button onclick="showTorque()">
表示
</button>

<div id="torqueResult"></div>

<br>
<hr>
<br>

  <span id="version"></span>
</footer>

<script src="../../../version.js"></script>

<script src="../../../js/other/torque.js"></script>

</body>
</html>
