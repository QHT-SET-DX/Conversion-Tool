<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF6ガス 充填量</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<header>
  <img src="../../images/001.gif" class="header-logo">
  <h1>換 算 ア プ リ</h1>
</header>

<h2>SF6ガス 充填目標圧力</h2>

<div class="input-group">
    <input
      type="number"
      id="target20Pressure"
      placeholder="20℃基準目標圧力">

    <select id="targetUnit">
        <option value="MPa,G">MPa・G</option>
        <option value="MPa,abs">MPa・abs</option>
        <option value="kgf,G">kgf/cm²・G</option>
        <option value="kgf,abs">kgf/cm²・abs</option>
    </select>
</div>

<div class="input-group">
    <input
      type="number"
      id="currentTemp"
      placeholder="現在温度">
    <span>℃</span>
</div>

<button onclick="calcFillingPressure()">
計算
</button>

<div id="fillingResult"></div>

<br>
<hr>

</footer>

<script src="../../js/gas/filling.js"></script>

</body>
</html>
