<h2>ガス圧20℃換算</h2>

<div class="input-group">

 <input 
   type="number"
   id="gaugePressure" 
   step="0.001" 
   Placeholder="ゲージ圧">

 <select id="pressureUnit">
    <option value="MPa">MPa</option>
    <option value="kgf">kgf/cm²</option>
 </select>

</div>

<div class="input-group">

 <input 
   type="number" 
   id="currentTemp" 
   step="0.1" 
   placeholder="現在温度">
 <span>℃</span>
 
</div>

<button onclick= "calc20deg()">
換算
</button>

<p id="temp20Result"></p>
