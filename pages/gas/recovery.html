<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF6ガス 回収率</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<header>
  <img src="../../images/001.gif" class="header-logo">
  <h1>換 算 ア プ リ</h1>
</header>

<h2>SF6ガス 回収率算出</h2>

<div class="input-group">

 <span>回収前ガス圧</span>
 
 <input type="number" 
   id="beforePressure" 
   step="0.001" 
   Placeholder="ガス圧">

 <select id="beforeUnit">
    <option value="MPa,G">MPa・G</option>
    <option value="MPa,abs">MPa・abs</option>
    <option value="kgf,G">kgf/cm²・G</option>
    <option value="kgf,abs">kgf/cm²・abs</option>
 </select>

</div>

<div class="input-group">

  <span>回収前温度</span>
  
  <input type="number" 
   id="beforeTemp" 
   step="0.1" 
   placeholder="温度">
  
  <span>℃</span>

</div>

<div class="input-group">

 <span>回収後ガス圧</span>

 <input 
   type="number" 
   id="afterPressure" 
   step="0.001" 
   Placeholder="ガス圧">

 <select id="afterUnit">
    <option value="Pa">Pa</option>
    <option value="Torr">Torr</option>
    <option value="bar">bar</option>
 </select>

</div>

<div class="input-group">

  <span>回収後温度</span>
  
  <input type="number" 
   id="afterTemp" 
   step="0.1" 
   placeholder="温度">
  
  <span>℃</span>

</div>

<button onclick= "calcRecoveryRate()">
計算
</button>

<p id="recoveryRateResult"></p>

<br>
<hr>

<h2>SF6ガス 目標回収圧力算出</h2>

<div class="input-group">

  <span>回収前ガス圧</span>
  
  <input
    type="number"
    id="targetPressure"
    placeholder="ガス圧">
  
  <select id="targetUnit">
    <option value="MPa,G">MPa・G</option>
    <option value="MPa,abs">MPa・abs</option>
    <option value="kgf,G">kgf/cm²・G</option>
    <option value="kgf,abs">kgf/cm²・abs</option>
  </select>

</div>

<div class="input-group">

  <span>目標回収率</span>

  <input
    type="number"
    id="targetRecovery"
    placeholder="回収率(%)">

  <span>%</span>

</div>

<button onclick="calcTargetPressure()">
計算
</button>

<div id="targetPressureResult"></div>

<br>
<hr>
<br>

  <span id="version"></span>
</footer>

<script src="../../version.js"></script>

<script src="../../js/gas/recovery.js"></script>

</body>
</html>
