<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接触抵抗測定値換算</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header>
  <img src="../../images/001.gif" class="header-logo">
  <h1>換 算 ア プ リ</h1>
</header>
    
<h2>接触抵抗測定値換算</h2>

<div class="input-group">
    <input 
     type="number" 
     id="voltage" 
     placeholder="接触抵抗測定値">
    <span>mV</span>
</div>

<div class="input-group">
    <input 
     type="number" 
     id="current" 
     placeholder="流した電流">
    <span>A</span>
</div>

<div class="input-group">
    <input 
     type="number" 
     id="temperature" 
     placeholder="測定時温度">
    <span>℃</span>
</div>

<div class="input-group">
  
 <span>導体の材質</span>

 <select id="material">
   <option value="aluminum">アルミニウム</option>
   <option value="copper">銅</option>
    <option value="iron">鉄</option>
    <option value="castiron">鋳鉄</option>
    <option value="silver">銀</option>
 </select>

</div>

<button onclick="contactResistance()">
換算
</button>

<p id="contactResistanceResult"></p>

<br>
<hr>

  <span id="version"></span>
</footer>

<script src="../../version.js"></script>

<script src="../../js/electric/contactresistance.js"></script>

</body>
</html>
