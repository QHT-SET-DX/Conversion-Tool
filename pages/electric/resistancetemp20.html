<header>
  <img src="../../images/001.gif" class="header-logo">
  <h1>換 算 ア プ リ</h1>

<h2>抵抗温度換算</h2>

<input 
 type="number" 
 id="resistance" 
 step="0.0001" 
 placeholder="測定抵抗値(Ω)">

<input
 type="number"
 id="temperature"
 step="0.1"
 placeholder="測定温度(℃)">

<select id="material">
    <option value="copper">銅</option>
    <option value="aluminum">アルミニウム</option>
    <option value="iron">鉄</option>
    <option value="castiron">鋳鉄</option>
    <option value="silver">銀</option>
</select>

<button onclick="calcResistance20()">
換算
</button>

<p id="temp20Result"></p>
