<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合成抵抗計算</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<header>
  <img src="../../images/001.gif" class="header-logo">
  <h1>換 算 ア プ リ</h1>
</header>

<h2>合成抵抗計算</h2>

<div id="resistorContainer">

  <div class="resistor-row">
    <input
      type="number"
      class="resistor"
      placeholder="R1">
    <span class="unit">Ω</span>
  </div>

  <div class="resistor-row">
    <input
      type="number"
      class="resistor"
      placeholder="R2">
    <span class="unit">Ω</span>
  </div>

</div>

<button onclick="addResistor()">＋追加</button>
<button onclick="removeResistor()">－削除</button>

<br><br>

<div class="input-group">
 <select id="connectionType">
   <option value="series">直列</option>
   <option value="parallel">並列</option>
 </select>
 <span>回路</span>
</div>

<button onclick="calcEquivalent()">計算</button>

<p id="result"></p>

<br>
<hr>
<br>

</footer>

</body>
</html>
